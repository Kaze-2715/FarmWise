spring:
  application:
    name: farmwise-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/farmwise_dev?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${DB_USERNAME:farmwise}
    password: ${DB_PASSWORD:farmwise}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}

mybatis:
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

server:
  port: ${SERVER_PORT:8080}
